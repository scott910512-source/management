services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-korea-tracker
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      # SQLite DB 는 영속 볼륨에 저장 (절대경로)
      DATABASE_URL: "file:/app/data/prod.db"
      JWT_SECRET: "${JWT_SECRET:-please-change-this-internal-secret}"
      JWT_EXPIRES_IN: "7d"
      UPLOAD_DIR: "/app/uploads"
      CORS_ORIGIN: "*"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@travel.kr}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin1234}"
      ADMIN_NAME: "${ADMIN_NAME:-관리자}"
      MAX_PHOTOS_PER_VISIT: "20"
      SEED_SAMPLE: "${SEED_SAMPLE:-true}"
    volumes:
      - tkt_data:/app/data
      - tkt_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  tkt_data:
  tkt_uploads:

# ---------------------------------------------------------------------------
# PostgreSQL 전환 예시 (향후):
#   1) server/prisma/schema.prisma 의 datasource provider 를 "postgresql" 로 변경
#   2) 아래 db 서비스 주석 해제 후 app.environment.DATABASE_URL 를 연결
#
#   db:
#     image: postgres:16-alpine
#     environment:
#       POSTGRES_USER: travel
#       POSTGRES_PASSWORD: travel
#       POSTGRES_DB: travel
#     volumes:
#       - tkt_pg:/var/lib/postgresql/data
#   # volumes 에 tkt_pg 추가
#   # app.environment.DATABASE_URL: "postgresql://travel:travel@db:5432/travel?schema=public"
# ---------------------------------------------------------------------------
